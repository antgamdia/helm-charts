# Full chart upgrade testing values for k3s.
# Tests upgrade with all components enabled.

trento-wanda:
  enabled: true

trento-mcp-server:
  enabled: true

prometheus:
  enabled: true
  server:
    auth:
      type: none

trento-web:
  ingress:
    enabled: false

rabbitmq:
  service:
    type: ClusterIP
  # Static config: skip the Go-template expression in the default extraConfiguration.
  extraConfiguration: |
    listeners.tcp.default = 5672

global:
  trentoWeb:
    origin: "localhost"
  postgresql:
    postgresqlPassword: "trento-test"
  rabbitmq:
    auth:
      password: "trento-test"
