# Full chart upgrade testing values for k3s.
# Tests upgrade with all components enabled.

trento-wanda:
  enabled: true

trento-mcp-server:
  enabled: true
  mcpServer:
    enableHealthCheck: false

prometheus:
  enabled: true
  server:
    auth:
      type: none

trento-web:
  ingress:
    enabled: false

global:
  trentoWeb:
    origin: "localhost"
  postgresql:
    postgresqlPassword: "trento-test"
  rabbitmq:
    auth:
      password: "trento-test"
