name: Chart Upgrade Test

on:
  push:
    branches:
      - "main"
  pull_request:
  workflow_dispatch:
    inputs:
      from-source:
        description: 'Test source: suse-release, oss-release, or oss-main'
        required: false
      from-version:
        description: 'Specific version override (defaults to latest for source)'
        required: false

env:
  HELM_VERSION: v4.2.0
  K3S_VERSION: v1.31.2+k3s1
  CERT_MANAGER_VERSION: v1.16.2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upgrade-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: "SUSE latest release → current"
            source: suse-release
            registry: registry.suse.com/trento/trento-server
            version: ""
          - name: "OSS latest release → current"
            source: oss-release
            registry: ghcr.io/trento-project/helm-charts/trento-server
            version: ""
          - name: "OSS main branch → current"
            source: oss-main
            registry: ghcr.io/trento-project/helm-charts/trento-server
            version: ""
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Resolve chart source
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source="${{ inputs.from-source || matrix.source }}"
          registry="${{ matrix.registry }}"

          # Use explicit version if provided, otherwise resolve latest for each source
          if [ -n "${{ inputs.from-version }}" ]; then
            resolved_version="${{ inputs.from-version }}"
          elif [ "$source" == "suse-release" ]; then
            # List tags from SUSE registry, filter semantic versions, get latest
            resolved_version=$(skopeo list-tags "docker://${registry}" | \
              jq -r '.Tags[]' | grep '^[0-9]\+\.[0-9]\+\.[0-9]' | sort -V | tail -1)
          elif [ "$source" == "oss-release" ]; then
            # Get latest stable release tag from GitHub
            resolved_version=$(gh release list \
              --repo trento-project/helm-charts \
              --exclude-pre-releases \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName')
          else
            # oss-main: use the chart version from Chart.yaml (OCI artifact tag in GHCR for rolling release)
            resolved_version=$(grep '^version:' charts/trento-server/Chart.yaml | awk '{print $2}')
          fi

          echo "source=${source}" >> "$GITHUB_OUTPUT"
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "version=${resolved_version}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${source} → ${resolved_version}"

      - name: Verify GHCR chart access (OSS sources only)
        if: contains(steps.source.outputs.source, 'oss')
        run: |
          echo "Verifying access to oci://${{ steps.source.outputs.registry }}:${{ steps.source.outputs.version }}"
          helm pull oci://${{ steps.source.outputs.registry }} \
            --version "${{ steps.source.outputs.version }}" \
            --destination /tmp/
          echo "✓ Chart is accessible without authentication"

      - name: Create k3s cluster
        uses: jupyterhub/action-k3s-helm@502a9ff4d816dad543e359971fe2c3128d0f4c6e # v4
        with:
          k3s-version: ${{ env.K3S_VERSION }}

      - name: Install cert-manager CRDs
        run: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/${{ env.CERT_MANAGER_VERSION }}/cert-manager.crds.yaml

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version ${{ env.CERT_MANAGER_VERSION }} \
            --wait
        continue-on-error: true

      - name: Install chart from ${{ steps.source.outputs.source }}
        run: |
          helm install trento-server \
            oci://${{ steps.source.outputs.registry }} \
            --version "${{ steps.source.outputs.version }}" \
            --namespace trento \
            --create-namespace \
            --wait \
            --timeout 10m \
            -f .github/test-values/upgrade-test.yaml

      - name: Build chart dependencies
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm dependency build charts/trento-server

      - name: Compare container versions (before upgrade)
        run: |
          echo "=== Extracting current deployed images ==="
          kubectl get pods -n trento -o json | \
            jq -r '
              .items[] |
              (.spec.initContainers // [])[] as $c |
              "\($c.name):\($c.image)"
            ' | sort -u > /tmp/current-images.txt

          kubectl get pods -n trento -o json | \
            jq -r '
              .items[] |
              (.spec.containers // [])[] as $c |
              "\($c.name):\($c.image)"
            ' | sort -u >> /tmp/current-images.txt

          echo "=== Extracting new chart images ==="
          helm template trento charts/trento-server/ \
            -f .github/test-values/upgrade-test.yaml \
            | grep -E "^\s+image:" \
            | awk '{print $2}' \
            | tr -d '"' \
            | sort -u > /tmp/new-images.txt

          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════╗"
          echo "║                    CONTAINER VERSION COMPARISON                        ║"
          echo "╚════════════════════════════════════════════════════════════════════════╝"
          echo ""

          # Parse image names and compare
          while IFS= read -r new_img; do
            base_img=$(echo "$new_img" | sed -E 's/:[^:]*$//')
            new_tag=$(echo "$new_img" | sed -E 's/.*://')

            # Find matching old image
            old_img=$(grep -E "^[^:]+:${base_img}:" /tmp/current-images.txt | head -1 | cut -d: -f2-)
            if [ -z "$old_img" ]; then
              old_img=$(grep "${base_img##*/}:" /tmp/current-images.txt | head -1 | cut -d: -f2-)
            fi

            if [ -n "$old_img" ]; then
              old_tag=$(echo "$old_img" | sed -E 's/.*://')
              img_name=$(echo "$base_img" | sed -E 's|.*/||')

              if [ "$old_tag" != "$new_tag" ]; then
                echo "🔄 UPGRADE: ${img_name}"
                echo "   FROM: ${old_tag}"
                echo "   TO:   ${new_tag}"
                echo ""
              else
                echo "✓ NO CHANGE: ${img_name}:${new_tag}"
                echo ""
              fi
            else
              echo "🆕 NEW: ${new_img}"
              echo ""
            fi
          done < /tmp/new-images.txt

      - name: Upgrade to current dev chart
        run: |
          echo "=== Starting upgrade ==="
          kubectl get pods -n trento

          helm upgrade trento-server charts/trento-server \
            --namespace trento \
            --wait \
            --timeout 10m \
            --debug \
            -f .github/test-values/upgrade-test.yaml

      - name: Verify upgrade
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n trento

          echo "=== Web init container logs (DB migration) ==="
          WEB_POD=$(kubectl get pod -n trento \
            -l "app.kubernetes.io/name=web,app.kubernetes.io/instance=trento-server" \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl logs "$WEB_POD" -n trento -c init

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "=== All pods ==="
          kubectl get pods -n trento -o wide

          echo "=== Events ==="
          kubectl get events -n trento --sort-by='.lastTimestamp'

          echo "=== All container logs ==="
          for pod in $(kubectl get pods -n trento -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- $pod ---"
            kubectl logs -n trento "$pod" --all-containers=true --ignore-errors=true || true
            echo "--- $pod (previous) ---"
            kubectl logs -n trento "$pod" --all-containers=true --previous --ignore-errors=true || true
          done
